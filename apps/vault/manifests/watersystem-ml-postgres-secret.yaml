apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: watersystem-ml-postgres-secret
  namespace: watersystem-ml
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: postgres-watersystem-ml-secret
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: postgres/watersystem-ml
        property: POSTGRES_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: postgres/watersystem-ml
        property: POSTGRES_PASSWORD