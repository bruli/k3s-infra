apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mycalendar-telegram-secret
  namespace: mycalendar
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: telegram-secret
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: telegram/myCalendar
        property: token
    - secretKey: chat_id
      remoteRef:
        key: telegram/myCalendar
        property: chat_id