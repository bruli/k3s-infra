apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: observability

  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: tempo-distributed
    targetRevision: 1.61.3
    helm:
      values: |
        fullnameOverride: tempo

        minio:
          enabled: true

        traces:
          otlp:
            grpc:
              enabled: true
            http:
              enabled: true

        distributor:
          replicas: 1

        ingester:
          replicas: 1
          config:
            replication_factor: 1

        querier:
          replicas: 1

        queryFrontend:
          replicas: 1

        compactor:
          replicas: 1

        metricsGenerator:
          enabled: false

        serviceMonitor:
          enabled: false

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true