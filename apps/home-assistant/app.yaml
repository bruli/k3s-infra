apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: home-assistant
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: home-assistant
  source:
    repoURL: http://pajikos.github.io/home-assistant-helm-chart/
    chart: home-assistant
    targetRevision: 0.3.47
    helm:
      releaseName: home-assistant
      valuesObject:
        controller:
          type: StatefulSet

        persistence:
          enabled: true
          size: 10Gi
          accessMode: ReadWriteOnce
          storageClass: longhorn

        ingress:
          enabled: true
          hosts:
            - host: ha.bru-li.me
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: home-assistant-tls
              hosts:
                - ha.bru-li.me

        additionalVolumes:
          - name: ha-secrets
            secret:
              secretName: home-assistant-secrets

        additionalMounts:
          - name: ha-secrets
            mountPath: /config/secrets.yaml
            subPath: secrets.yaml
            readOnly: true

        configuration:
          enabled: true
          forceInit: true
          trusted_proxies:
            - 10.42.0.0/16
            - 10.43.0.0/16
          templateConfig: |-
            default_config:

            http:
              use_x_forwarded_for: true
              trusted_proxies:
                - 10.42.0.0/16
                - 10.43.0.0/16

            frontend:
              themes: !include_dir_merge_named themes

            template:
              - binary_sensor:
                  - name: "Bonsai Big Roots Active"
                    unique_id: bonsai_big_roots_active
                    availability: >
                      {{ "{{ states('sensor.bonsai_big_soil_temperature') not in ['unknown', 'unavailable', 'none'] }}" }}
                    state: >
                      {{ "{% set t = states('sensor.bonsai_big_soil_temperature') | float %}" }}
                      {{ "{{ 5 <= t <= 30 }}" }}

            recorder:
              purge_keep_days: 365
              include:
                entity_globs:
                  - sensor.bonsai_*
                  - binary_sensor.bonsai_*
            influxdb:
                api_version: 2
                host: influxdb.influxdb.svc.cluster.local
                port: 8086
                ssl: false
                organization: home
                bucket: homeassistant
                token: !secret influxdb_password
                default_measurement: state
            rest_command:
              irrigate_bonsai_big:
                url: "http://192.168.1.10:8080/zones/bb/execute"
                method: POST
                headers:
                  Authorization: !secret irrigation_api_authorization
                content_type: "application/json"
                payload: '{"seconds": 15}'
              irrigate_bonsai_small:
                url: "http://192.168.1.10:8080/zones/bs/execute"
                method: POST
                headers:
                  Authorization: !secret irrigation_api_authorization
                content_type: "application/json"
                payload: '{"seconds": 10}'

            automation: !include automations.yaml
            script: !include scripts.yaml
            scene: !include scenes.yaml

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true