apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fluent-bit
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  source:
    repoURL: https://fluent.github.io/helm-charts
    chart: fluent-bit
    targetRevision: "0.46.6"
    helm:
      values: |
        kind: DaemonSet

        serviceAccount:
          create: true

        rbac:
          create: true

        tolerations:
          - operator: Exists

        config:
          service: |
            [SERVICE]
                Daemon Off
                Flush 1
                Log_Level info
                Parsers_File parsers.conf
                HTTP_Server On
                HTTP_Listen 0.0.0.0
                HTTP_Port 2020

          inputs: |
            [INPUT]
                Name tail
                Path /var/log/containers/*.log
                multiline.parser docker, cri
                Tag kube.*
                Mem_Buf_Limit 50MB
                Skip_Long_Lines On
                Refresh_Interval 10

          filters: |
            [FILTER]
                Name kubernetes
                Match kube.*
                Kube_Tag_Prefix kube.var.log.containers.
                Merge_Log On
                Keep_Log Off
                K8S-Logging.Parser On
                K8S-Logging.Exclude Off

          outputs: |
            [OUTPUT]
                Name loki
                Match kube.*
                Host loki-gateway.monitoring.svc.cluster.local
                Port 80
                Labels job=fluent-bit, cluster=k3s, namespace=$kubernetes['namespace_name'], pod=$kubernetes['pod_name'], container=$kubernetes['container_name']
                LabelKeys level,service,subject,zone
                RemoveKeys stream
                LineFormat json

        daemonSetVolumes:
          - name: varlog
            hostPath:
              path: /var/log
          - name: containers
            hostPath:
              path: /var/lib/docker/containers
          - name: runlogjournal
            hostPath:
              path: /run/log/journal

        daemonSetVolumeMounts:
          - name: varlog
            mountPath: /var/log
          - name: containers
            mountPath: /var/lib/docker/containers
            readOnly: true
          - name: runlogjournal
            mountPath: /run/log/journal
            readOnly: true