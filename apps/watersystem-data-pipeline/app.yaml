apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: watersystem-data-pipeline
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps
  annotations:
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/bruli/watersystem-data-pipeline
    argocd-image-updater.argoproj.io/app.update-strategy: semver
    argocd-image-updater.argoproj.io/app.allow-tags: regexp:^v[0-9]+\.[0-9]+\.[0-9]+$
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: default
  source:
    repoURL: https://github.com/bruli/waterSystem-data-pipeline.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: watersystem-data-pipeline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true